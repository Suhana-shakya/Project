<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>

    <link rel="stylesheet" href="payment.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<nav>

    <div class="logo">HiMovie</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Now Showing</a></li>
        <li><a href="upcomingMovies.html">Upcoming</a></li>
        <li><a href="#">Actors</a></li>
        <i class="fa-solid fa-magnifying-glass"></i>
        <li class="login"><a href="login.html">Login</a></li>
    </ul>

</nav>

<section class="payment">

    <div class="payment-card">

        <h1>PAYMENT DETAILS</h1>

        <div class="summary">

            <h2>Booking Summary</h2>

            <div class="row">
                <span>Movie</span>
                <span>Obsession</span>
            </div>

            <div class="row">
                <span>Cinema</span>
                <span>Ranjana Cineplex</span>
            </div>

            <div class="row">
                <span>Date</span>
                <span>Tomorrow</span>
            </div>

            <div class="row">
                <span>Time</span>
                <span>5:30 PM</span>
            </div>

            <div class="row">
                <span>Seats</span>
                <span>D4, D5</span>
            </div>

            <div class="row total">
                <span>Total</span>
                <span>Rs. 900</span>
            </div>

        </div>

        <div class="methods">

            <h2>Select Payment Method</h2>

            <label>
                <input type="radio" name="payment">
                eSewa
            </label>

            <label>
                <input type="radio" name="payment">
                Khalti
            </label>

            <label>
                <input type="radio" name="payment">
                IME Pay
            </label>

            <label>
                <input type="radio" name="payment">
                Debit / Credit Card
            </label>

        </div>

        <a href="confirmation.html" class="pay-btn">
            <i class="fa-solid fa-credit-card"></i>
            PAY NOW
        </a>

    </div>

</section>

</body>
</html>
