<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Showtime</title>

<link rel="stylesheet" href="addMovie.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>
<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>HiMovie</h2>

        <ul>

            <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

            <li><a href="manageMovies.html"><i class="fa-solid fa-film"></i> Manage Movies</a></li>

            <li class="active"><a href="manageShowtimes.html"><i class="fa-solid fa-clock"></i> Showtimes</a></li>

            <li><a href="manageHalls.html"><i class="fa-solid fa-building"></i> Cinema Halls</a></li>

            <li><a href="manageBookings.html"><i class="fa-solid fa-ticket"></i> Bookings</a></li>

            <li><a href="manageUsers.html"><i class="fa-solid fa-users"></i> Users</a></li>

            <li><a href="adminLogin.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <h1>Add Showtime</h1>

        <form>

            <div class="form-group">
                <label>Select Movie</label>

                <select>
                    <option>Obsession</option>
                    <option>Dhamaal 4</option>
                    <option>The Odyssey</option>
                    <option>Welcome to the Jungle</option>
                </select>

            </div>

            <div class="form-group">
                <label>Select Cinema Hall</label>

                <select>
                    <option>Civil Mall</option>
                    <option>Labim Mall</option>
                    <option>Ranjana Mall</option>
                </select>

            </div>

            <div class="row">

                <div class="form-group">
                    <label>Show Date</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>Show Time</label>
                    <select>
                        <option>10:30 AM</option>
                        <option>1:00 PM</option>
                        <option>5:30 PM</option>
                        <option>8:15 PM</option>
                    </select>
                </div>

            </div>

            <div class="form-group">
                <label>Ticket Price (Rs.)</label>
                <input type="number" placeholder="500">
            </div>

            <button class="save-btn">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Showtime
            </button>

        </form>

    </main>

</div>

</body>
</html>
