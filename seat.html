<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>

    <link rel="stylesheet" href="seat.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>
<nav>
    <div class="logo">
        HiMovie
    </div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Now Showing</a></li>
        <li><a href="upcomingMovies.html">Upcoming</a></li>
        <li><a href="#">Actors</a></li>
        <i class="fa-solid fa-magnifying-glass"></i>
        <li class="login"><a href="login.html">Login</a></li>
    </ul>
</nav>
<div class="container">

    <!-- Left Side -->

    <div class="movie-info">

        <img src="./images/obsession.jpg">

        <p>Now Showing</p>

        <h2>OBSESSION</h2>

    </div>

    <!-- Right Side -->

    <div class="seat-area">

        <h2>
            Seat :
        </h2>

        <h3>PLATINUM - NPR 440</h3>

        <div class="screen"></div>

        <div class="seats">

            <!-- Row 1 -->

            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>

            <div class="gap"></div>

            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat taken"></div>
            <div class="seat"></div>
            <div class="seat"></div>

            <!-- Row 2 -->

            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>

            <div class="gap"></div>

            <div class="seat"></div>
            <div class="seat taken"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>

            <!-- Row 3 -->

            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>

            <div class="gap"></div>

            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>

        </div>

        <h3>PREMIUM - NPR 550</h3>

        <div class="screen"></div>

        <div class="seats">

            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>

            <div class="gap"></div>

            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat taken"></div>
            <div class="seat"></div>

        </div>

        <div class="legend">

            <div>
                <span class="available"></span>
                Available
            </div>

            <div>
                <span class="taken-box"></span>
                Taken
            </div>


        </div>

        <!-- <button>
            Confirm
        </button> -->
        <div class="confirm">

                <a href="payment.html" class="confirm-btn">
                    BOOK NOW
                </a>

        </div>

    </div>

</div>

</html>
