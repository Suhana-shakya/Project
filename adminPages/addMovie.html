<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Movie</title>

    <link rel="stylesheet" href="addMovie.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>HiMovie</h2>

        <ul>

            <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

            <li class="active"><a href="manageMovies.html"><i class="fa-solid fa-film"></i> Manage Movies</a></li>

            <li><a href="manageShowtimes.html"><i class="fa-solid fa-clock"></i> Showtimes</a></li>

            <li><a href="manageHalls.html"><i class="fa-solid fa-building"></i> Cinema Halls</a></li>

            <li><a href="manageBookings.html"><i class="fa-solid fa-ticket"></i> Bookings</a></li>

            <li><a href="manageUsers.html"><i class="fa-solid fa-users"></i> Users</a></li>

            <li><a href="adminLogin.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <h1>Add New Movie</h1>

        <form>

            <div class="form-group">
                <label>Movie Name</label>
                <input type="text" placeholder="Enter movie name">
            </div>

            <div class="row">

                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" placeholder="Genre">
                </div>

                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" placeholder="2h 15m">
                </div>

            </div>

            <div class="form-group">
                <label>Director</label>
                <input type="text" placeholder="Director name">
            </div>

            <div class="form-group">
                <label>Cast</label>
                <input type="text" placeholder="Actor 1, Actor 2, Actor 3">
            </div>

            <div class="row">

                <div class="form-group">
                    <label>Release Date</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>Rating</label>
                    <input type="number" step="0.1" min="0" max="10" placeholder="8.5">
                </div>

            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea rows="5" placeholder="Movie description"></textarea>
            </div>

            <div class="form-group">
                <label>Poster Image</label>
                <input type="file">
            </div>

            <div class="form-group">
                <label>Trailer URL</label>
                <input type="url" placeholder="https://youtube.com/...">
            </div>

            <div class="form-group">
                <label>Status</label>

                <select>
                    <option>Now Showing</option>
                    <option>Upcoming</option>
                </select>

            </div>

            <button type="submit" class="save-btn">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Movie
            </button>

        </form>

    </main>

</div>

</body>
</html>
