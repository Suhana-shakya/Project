<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Movie</title>

    <link rel="stylesheet" href="addMovie.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>HiMovie</h2>

        <ul>

            <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

            <li class="active">
                <a href="manageMovies.html">
                    <i class="fa-solid fa-film"></i> Manage Movies
                </a>
            </li>

            <li><a href="manageShowtimes.html"><i class="fa-solid fa-clock"></i> Showtimes</a></li>

            <li><a href="manageHalls.html"><i class="fa-solid fa-building"></i> Cinema Halls</a></li>

            <li><a href="manageBookings.html"><i class="fa-solid fa-ticket"></i> Bookings</a></li>

            <li><a href="manageUsers.html"><i class="fa-solid fa-users"></i> Users</a></li>

            <li><a href="adminLogin.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main">

        <h1>Edit Movie</h1>

        <form>

            <div class="form-group">
                <label>Movie Name</label>
                <input type="text" value="Obsession">
            </div>

            <div class="row">

                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" value="Horror">
                </div>

                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" value="1 Hour 55 Minutes">
                </div>

            </div>

            <div class="form-group">
                <label>Director</label>
                <input type="text" value="Curry Barker">
            </div>

            <div class="form-group">
                <label>Cast</label>
                <input type="text"
                value="Michael Johnston, Inde Navarrette, Cooper Tomlinson">
            </div>

            <div class="row">

                <div class="form-group">
                    <label>Release Date</label>
                    <input type="date" value="2026-05-15">
                </div>

                <div class="form-group">
                    <label>Rating</label>
                    <input type="number" step="0.1" value="7.8">
                </div>

            </div>

            <div class="form-group">
                <label>Description</label>

                <textarea rows="5">After breaking the mysterious "One Wish Willow" to win his crush's heart, a hopeless romantic finds himself getting exactly what he asked for but soon discovers that some desires come at a dark, sinister price.</textarea>

            </div>

            <div class="form-group">
                <label>Change Poster</label>
                <input type="file">
            </div>

            <div class="form-group">
                <label>Trailer URL</label>
                <input type="url"
                value="https://youtu.be/QparPBLUeEI?si=DkYiPlm6TKbSirXy">
            </div>

            <div class="form-group">
                <label>Status</label>

                <select>

                    <option selected>Now Showing</option>

                    <option>Upcoming</option>

                </select>

            </div>

            <button class="save-btn">
                <i class="fa-solid fa-pen"></i>
                Update Movie
            </button>

        </form>

    </main>

</div>

</body>
</html>
