<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation</title>

    <link rel="stylesheet" href="confirmation.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<nav>

    <div class="logo">HiMovie</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Now Showing</a></li>
        <li><a href="upcomingMovies.html">Upcoming</a></li>
        <li><a href="#">Actors</a></li>
        <i class="fa-solid fa-magnifying-glass"></i>
        <li class="login"><a href="login.html">Login</a></li>
    </ul>

</nav>

<section class="confirmation">

    <div class="card">

        <i class="fa-solid fa-circle-check success-icon"></i>

        <h1>Booking Confirmed!</h1>

        <p class="message">
            Your movie ticket has been booked successfully.
        </p>

        <div class="ticket-details">

            <div class="row">
                <span>Booking ID</span>
                <span>HM102548</span>
            </div>

            <div class="row">
                <span>Movie</span>
                <span>Obsession</span>
            </div>

            <div class="row">
                <span>Cinema</span>
                <span>Ranjana Cineplex</span>
            </div>

            <div class="row">
                <span>Date</span>
                <span>Tomorrow</span>
            </div>

            <div class="row">
                <span>Time</span>
                <span>5:30 PM</span>
            </div>

            <div class="row">
                <span>Seats</span>
                <span>D4, D5</span>
            </div>

            <div class="row">
                <span>Total Paid</span>
                <span>Rs. 900</span>
            </div>

        </div>

        <div class="buttons">

            <a href="index.html" class="home-btn">
                Back to Home
            </a>

            <a href="#" class="ticket-btn">
                Download Ticket
            </a>

        </div>

    </div>

</section>

</body>
</html>
