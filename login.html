<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Booking Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

<nav>

    <div class="logo">
        <i class="fa-solid fa-clapperboard"></i>
        <span>HiMovie</span>
    </div>

    <ul>

        <li><a href="index.html">Home</a></li>

        <li><a href="movies.html">Now Showing</a></li>

        <li><a href="upcomingMovies.html">Upcoming</a></li>

        <li class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search movies...">
        </li>

        <li>
            <a href="login.html" class="login-btn">
                <i class="fa-solid fa-user"></i>
                Login
            </a>
        </li>

    </ul>

</nav>

<section class="login-section">

    <div class="submit-box">

        <i class="fa-solid fa-ticket ticket-icon"></i>

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Sign in to continue booking your favorite movies.
        </p>

        <form action="login_process.php" method="post">

            <input
                type="email"
                name="email"
                placeholder="Enter your Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Enter your Password"
                required>

            <button type="submit" class="submit-btn">
                Login
            </button>

            <p class="forgot">
                <a href="#">Forgot Password?</a>
            </p>

            <p class="register">
                Don't have an account?
                <a href="register.html">Sign Up</a>
            </p>

        </form>

    </div>

</section>

</body>
</html>
